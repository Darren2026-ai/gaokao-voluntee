<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>完整流程自动化测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei'; background: #f5f5f5; padding: 20px; }
    .test-container { max-width: 1200px; margin: 0 auto; }
    .test-header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .test-status { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .status-item { padding: 8px 12px; border-radius: 4px; font-size: 14px; font-weight: 600; }
    .status-ok { background: #d4edda; color: #155724; }
    .status-error { background: #f8d7da; color: #721c24; }
    .status-warning { background: #fff3cd; color: #856404; }
    .test-log { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
    .log-item { padding: 10px; border-bottom: 1px solid #e0e0e0; font-family: 'Monaco', 'Courier New'; font-size: 13px; }
    .log-item:last-child { border-bottom: none; }
    .log-success { color: #28a745; }
    .log-error { color: #dc3545; }
    .log-info { color: #0066cc; }
    button { padding: 10px 20px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-top: 10px; }
    button:hover { background: #0052a3; }
    iframe { width: 100%; height: 800px; border: 1px solid #ddd; border-radius: 8px; margin-top: 20px; }
  </style>
</head>
<body>

<div class="test-container">
  <div class="test-header">
    <h1>🧪 高考志愿系统 - 完整流程自动化测试</h1>
    <p style="margin-top: 10px; color: #666;">模拟真实用户操作，检查所有功能是否正常</p>
    <div class="test-status">
      <div class="status-item" id="status-page">📄 页面加载：检查中...</div>
      <div class="status-item" id="status-data">📊 数据加载：检查中...</div>
      <div class="status-item" id="status-flow">🔄 流程测试：待开始</div>
      <div class="status-item" id="status-result">🎯 结果生成：待开始</div>
    </div>
    <button onclick="startFullTest()">开始完整测试 ▶️</button>
    <button onclick="clearLogs()">清空日志</button>
  </div>

  <div class="test-log" id="logContainer">
    <div class="log-item log-info">🟦 测试日志会在这里显示...</div>
  </div>

  <iframe id="testFrame" src="index.html"></iframe>
</div>

<script>
const logs = [];

function log(message, type = 'info') {
  const timestamp = new Date().toLocaleTimeString('zh-CN');
  const logEntry = `[${timestamp}] ${message}`;
  logs.push({ message: logEntry, type });
  
  const logContainer = document.getElementById('logContainer');
  const logItem = document.createElement('div');
  logItem.className = `log-item log-${type}`;
  logItem.textContent = logEntry;
  logContainer.appendChild(logItem);
  logContainer.scrollTop = logContainer.scrollHeight;
}

function updateStatus(key, status, text) {
  const statusEl = document.getElementById(`status-${key}`);
  if (statusEl) {
    statusEl.className = `status-item status-${status}`;
    statusEl.textContent = text;
  }
}

function clearLogs() {
  document.getElementById('logContainer').innerHTML = '<div class="log-item log-info">🟦 日志已清空</div>';
  logs.length = 0;
}

async function startFullTest() {
  log('========== 测试开始 ==========', 'info');
  clearLogs();
  
  try {
    // 1. 检查页面加载
    log('1️⃣ 检查页面加载...', 'info');
    const frame = document.getElementById('testFrame');
    await new Promise(resolve => {
      const check = () => {
        if (frame.contentDocument && frame.contentDocument.readyState === 'complete') {
          resolve();
        } else {
          setTimeout(check, 500);
        }
      };
      check();
    });
    
    const frameDoc = frame.contentDocument || frame.contentWindow.document;
    const frameWindow = frame.contentWindow;
    
    if (!frameDoc) throw new Error('无法访问iframe内容');
    log('✅ 页面加载成功', 'success');
    updateStatus('page', 'ok', '📄 页面加载：✅ 成功');
    
    // 2. 检查关键对象
    log('2️⃣ 检查全局对象...', 'info');
    if (!frameWindow.GaoKaoAnalyzer) throw new Error('GaoKaoAnalyzer 未加载');
    log('✅ GaoKaoAnalyzer 对象存在', 'success');
    
    if (!frameWindow.COLLEGES) throw new Error('COLLEGES 数据未加载');
    log(`✅ COLLEGES 数据已加载（${frameWindow.COLLEGES.length}所高校）`, 'success');
    
    if (!frameWindow.generateReport) throw new Error('generateReport 函数未定义');
    log('✅ generateReport 函数存在', 'success');
    
    updateStatus('data', 'ok', '📊 数据加载：✅ 成功');
    
    // 3. 自动填写表单（模拟用户操作）
    log('3️⃣ 开始自动填表...', 'info');
    updateStatus('flow', 'warning', '🔄 流程测试：进行中...');
    
    // Step 1: 基本信息
    log('   → 填写Step 1：基本信息', 'info');
    frameDoc.getElementById('f-name').value = '测试同学';
    frameDoc.querySelector('input[name="gender"][value="女"]').checked = true;
    frameDoc.getElementById('f-province').value = '广东';
    frameDoc.getElementById('f-subject').value = '物理类（物化生）';
    log('   ✅ Step 1 填写完毕', 'success');
    
    // 触发 nextStep
    frameWindow.nextStep(1);
    await new Promise(resolve => setTimeout(resolve, 500));
    
    // Step 2: 成绩信息
    log('   → 填写Step 2：成绩信息', 'info');
    frameDoc.getElementById('f-score').value = '591';
    frameDoc.getElementById('f-rank').value = '11500';
    frameWindow.updateScorePreview();
    log('   ✅ Step 2 填写完毕', 'success');
    
    frameWindow.nextStep(2);
    await new Promise(resolve => setTimeout(resolve, 500));
    
    // Step 3: 兴趣与性格
    log('   → 填写Step 3：兴趣与性格', 'info');
    const interestItems = frameDoc.querySelectorAll('.interest-item');
    if (interestItems.length > 0) interestItems[0].click();  // 选择第一个兴趣
    if (interestItems.length > 1) interestItems[1].click();  // 选择第二个兴趣
    log(`   ✅ 选择了${Math.min(2, interestItems.length)}个兴趣选项`, 'success');
    
    const majorItems = frameDoc.querySelectorAll('.major-item');
    if (majorItems.length > 0) majorItems[0].click();  // 选择第一个专业
    log(`   ✅ 选择了1个专业大类`, 'success');
    
    frameDoc.getElementById('f-target-major').value = '计算机相关';
    
    frameWindow.nextStep(3);
    await new Promise(resolve => setTimeout(resolve, 500));
    
    // Step 4: 城市选择
    log('   → 填写Step 4：城市选择', 'info');
    const cityItems = frameDoc.querySelectorAll('.city-item');
    if (cityItems.length > 0) cityItems[0].click();  // 选择第一个城市
    log(`   ✅ 选择了城市`, 'success');
    
    frameWindow.nextStep(4);
    await new Promise(resolve => setTimeout(resolve, 500));
    
    // Step 5: 志愿优先级
    log('   → 填写Step 5：志愿优先级', 'info');
    const priorityCards = frameDoc.querySelectorAll('.priority-card');
    if (priorityCards.length > 0) {
      frameWindow.selectPriority(priorityCards[0], 'balanced');
      log('   ✅ 选择了志愿优先级：平衡选择', 'success');
    }
    
    frameWindow.nextStep(5);
    await new Promise(resolve => setTimeout(resolve, 500));
    
    // Step 6: 家庭与资源
    log('   → 填写Step 6：家庭与资源', 'info');
    const familyItems = frameDoc.querySelectorAll('.check-item');
    if (familyItems.length > 0) familyItems[0].click();
    const awayRadio = frameDoc.querySelector('input[name="away"][value="支持"]');
    if (awayRadio) awayRadio.checked = true;
    frameDoc.getElementById('f-extra').value = '测试备注信息';
    log('   ✅ Step 6 填写完毕', 'success');
    
    frameWindow.nextStep(6);
    await new Promise(resolve => setTimeout(resolve, 500));
    
    // Step 7: 确认提交
    log('   → Step 7：确认信息并生成报告', 'info');
    log('   ⏳ 等待报告生成...', 'warning');
    
    // 调用生成报告
    await frameWindow.generateReport();
    
    await new Promise(resolve => setTimeout(resolve, 2000));
    
    // 检查报告是否生成
    const reportContent = frameDoc.getElementById('reportContent');
    if (reportContent && reportContent.innerHTML) {
      log('✅ 报告已生成', 'success');
      log(`✅ 报告内容长度：${reportContent.innerHTML.length} 字符`, 'success');
      updateStatus('result', 'ok', '🎯 结果生成：✅ 成功');
    } else {
      throw new Error('报告内容为空');
    }
    
    updateStatus('flow', 'ok', '🔄 流程测试：✅ 完成');
    
    log('========== 测试完成 ==========', 'success');
    log('🎉 所有检查均已通过！系统工作正常。', 'success');
    
  } catch (error) {
    log(`❌ 测试失败：${error.message}`, 'error');
    log(`错误堆栈：${error.stack}`, 'error');
    updateStatus('flow', 'error', '🔄 流程测试：❌ 失败');
    
    // 尝试读取iframe中的控制台错误
    try {
      console.error('Iframe 内容访问错误详情:', error);
    } catch (e) {}
  }
}
</script>

</body>
</html>
