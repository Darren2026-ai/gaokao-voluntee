<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>完整诊断</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
    .container { max-width: 1000px; margin: 0 auto; }
    .card { background: white; padding: 20px; margin: 15px 0; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h2 { margin-top: 0; color: #1890ff; border-bottom: 2px solid #e8e8e8; padding-bottom: 10px; }
    .success { color: #52c41a; font-weight: bold; }
    .error { color: #ff4d4f; font-weight: bold; }
    .warning { color: #faad14; font-weight: bold; }
    .code-block { background: #f5f5f5; padding: 10px; border-radius: 5px; font-family: monospace; margin: 10px 0; overflow-x: auto; }
    button { background: #1890ff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }
    button:hover { background: #40a9ff; }
    .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-left: 3px solid #1890ff; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>

<div class="container">
  <h1>🔧 高考志愿系统完整诊断</h1>
  
  <div class="card">
    <h2>1️⃣ 脚本加载检查</h2>
    <div id="load-check"></div>
  </div>
  
  <div class="card">
    <h2>2️⃣ 数据有效性检查</h2>
    <div id="data-check"></div>
  </div>
  
  <div class="card">
    <h2>3️⃣ 功能测试</h2>
    <button onclick="testFull()">点击测试完整流程</button>
    <div id="test-log" class="log" style="display:none;"></div>
  </div>
  
  <div class="card">
    <h2>4️⃣ 浏览器控制台日志</h2>
    <div id="console-log" class="log"></div>
  </div>
</div>

<script>
// 全局日志捕获
const logs = [];
const originalLog = console.log;
const originalError = console.error;

console.log = function(...args) {
  logs.push({ type: 'log', msg: args.join(' ') });
  originalLog.apply(console, args);
};

console.error = function(...args) {
  logs.push({ type: 'error', msg: args.join(' ') });
  originalError.apply(console, args);
};

// 页面加载完成后检查
window.addEventListener('load', () => {
  checkLoads();
  checkData();
  updateConsoleLogs();
});

function checkLoads() {
  const div = document.getElementById('load-check');
  let html = '';
  
  if (typeof COLLEGES !== 'undefined') {
    html += '<p class="success">✅ COLLEGES 已加载 (' + COLLEGES.length + ' 所院校)</p>';
  } else {
    html += '<p class="error">❌ COLLEGES 未定义!</p>';
  }
  
  if (typeof GUANGDONG_2025_RANK_TABLE !== 'undefined') {
    html += '<p class="success">✅ GUANGDONG_2025_RANK_TABLE 已加载</p>';
  } else {
    html += '<p class="error">❌ GUANGDONG_2025_RANK_TABLE 未定义!</p>';
  }
  
  if (typeof GaoKaoAnalyzer !== 'undefined') {
    html += '<p class="success">✅ GaoKaoAnalyzer 已加载</p>';
  } else {
    html += '<p class="error">❌ GaoKaoAnalyzer 未定义!</p>';
  }
  
  if (typeof ExamConverter !== 'undefined') {
    html += '<p class="success">✅ ExamConverter 已加载</p>';
  } else {
    html += '<p class="error">❌ ExamConverter 未定义!</p>';
  }
  
  div.innerHTML = html;
}

function checkData() {
  const div = document.getElementById('data-check');
  let html = '';
  
  try {
    if (typeof COLLEGES === 'undefined') {
      html += '<p class="error">❌ COLLEGES 未定义，无法检查</p>';
    } else {
      html += '<p>第一所院校: <strong>' + COLLEGES[0].name + '</strong></p>';
      html += '<p>专业组数: ' + COLLEGES[0].groups.length + '</p>';
      if (COLLEGES[0].groups[0]) {
        const g = COLLEGES[0].groups[0];
        html += '<p>第一个专业组代码: ' + g.code + '</p>';
        html += '<p>最低分数: ' + g.minScore + '分</p>';
        html += '<p>最低位次: ' + g.minRank + '</p>';
      }
    }
  } catch (e) {
    html += '<p class="error">❌ 检查出错: ' + e.message + '</p>';
  }
  
  div.innerHTML = html;
}

function testFull() {
  const log = document.getElementById('test-log');
  log.style.display = 'block';
  log.innerHTML = '';
  
  function addLog(msg, type='log') {
    const p = document.createElement('p');
    p.style.margin = '5px 0';
    if (type === 'error') {
      p.innerHTML = '<span class="error">❌ ' + msg + '</span>';
    } else if (type === 'success') {
      p.innerHTML = '<span class="success">✅ ' + msg + '</span>';
    } else {
      p.innerHTML = '📝 ' + msg;
    }
    log.appendChild(p);
  }
  
  try {
    addLog('开始测试...', 'log');
    
    // 检查 COLLEGES
    if (typeof COLLEGES === 'undefined') {
      addLog('COLLEGES 未定义', 'error');
      return;
    }
    addLog('COLLEGES 已加载: ' + COLLEGES.length + ' 所院校', 'success');
    
    // 检查 GaoKaoAnalyzer
    if (typeof GaoKaoAnalyzer === 'undefined') {
      addLog('GaoKaoAnalyzer 未定义', 'error');
      return;
    }
    addLog('GaoKaoAnalyzer 已加载', 'success');
    
    // 测试数据
    const userData = {
      name: '测试同学',
      gender: '女',
      province: '广东',
      subject: '物理类（物化生）',
      score: 630,
      userRank: null,
      interests: ['编程计算机', '数据统计分析'],
      targetMajor: '计算机',
      cityPreference: ['广州'],
      familyResources: [],
      awayPreference: '支持',
      extra: '',
    };
    addLog('创建测试用户数据', 'log');
    
    // 创建分析器
    const analyzer = new GaoKaoAnalyzer(userData);
    addLog('创建分析器实例', 'log');
    
    // 执行分析
    const result = analyzer.analyze();
    addLog('分析完成', 'success');
    
    // 检查结果
    addLog('分数: ' + result.userProfile.score, 'log');
    addLog('位次: ' + (result.rankInfo?.rank || 'N/A'), 'log');
    addLog('分数层级: ' + result.scoreLevel.label, 'log');
    
    // 检查院校列表
    if (result.collegeList) {
      addLog('冲志愿数: ' + result.collegeList.chong.length, 'log');
      addLog('稳志愿数: ' + result.collegeList.wen.length, 'log');
      addLog('保志愿数: ' + result.collegeList.bao.length, 'log');
    }
    
    addLog('🎉 所有测试通过!', 'success');
    
  } catch (error) {
    addLog('测试异常: ' + error.message, 'error');
    console.error(error);
  }
}

function updateConsoleLogs() {
  const div = document.getElementById('console-log');
  if (logs.length === 0) {
    div.innerHTML = '<p>（暂无日志）</p>';
  } else {
    let html = '';
    logs.forEach(log => {
      if (log.type === 'error') {
        html += '<p style="color:#ff4d4f;"><strong>[ERROR]</strong> ' + log.msg + '</p>';
      } else {
        html += '<p>[LOG] ' + log.msg + '</p>';
      }
    });
    div.innerHTML = html;
  }
}

// 定时更新日志
setInterval(updateConsoleLogs, 500);
</script>

<!-- 加载脚本 -->
<script src="data/colleges.js"></script>
<script src="js/analyzer.js"></script>

</body>
</html>
