<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>最小化测试 - 生成报告功能</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #333; margin-bottom: 20px; }
    .section { margin-bottom: 30px; }
    .section-title { font-weight: bold; color: #0066cc; margin-bottom: 15px; font-size: 16px; }
    input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    button { background: #0066cc; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin: 10px 0; }
    button:hover { background: #0052a3; }
    .log { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 4px; margin-top: 15px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .log-item { padding: 5px 0; border-bottom: 1px solid #eee; }
    .log-item.error { color: red; font-weight: bold; }
    .log-item.success { color: green; }
    .log-item.info { color: #0066cc; }
  </style>
</head>
<body>

<div class="container">
  <h1>🔧 最小化测试 - 生成报告功能</h1>
  
  <div class="section">
    <div class="section-title">📊 输入成绩（必填）</div>
    <input type="number" id="f-score" placeholder="输入高考分数，例如：630" min="200" max="750" />
  </div>

  <div class="section">
    <button onclick="testGenerateReport()">🚀 测试生成报告</button>
    <button onclick="clearLog()" style="background: #999;">🗑️ 清空日志</button>
  </div>

  <div class="log" id="log"></div>
</div>

<!-- 加载脚本 -->
<script src="data/colleges.js"></script>
<script src="js/analyzer.js"></script>

<script>
  let selectedInterests = [];
  let selectedCities = [];
  let selectedFamily = [];

  function log(message, type = 'info') {
    const logEl = document.getElementById('log');
    const item = document.createElement('div');
    item.className = `log-item ${type}`;
    const timestamp = new Date().toLocaleTimeString();
    item.textContent = `[${timestamp}] ${message}`;
    logEl.appendChild(item);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function clearLog() {
    document.getElementById('log').innerHTML = '';
  }

  async function testGenerateReport() {
    clearLog();
    try {
      log('🟡 开始测试...');
      
      log('✅ COLLEGES 已加载: ' + (typeof COLLEGES !== 'undefined' ? COLLEGES.length + ' 所' : '❌'));
      log('✅ GaoKaoAnalyzer 已加载: ' + (typeof GaoKaoAnalyzer !== 'undefined' ? '✓' : '❌'));
      
      const score = parseInt(document.getElementById('f-score').value);
      if (!score || score < 200 || score > 750) {
        throw new Error('请输入有效的高考分数（200-750分），你输入的是: ' + document.getElementById('f-score').value);
      }

      log('🟡 创建分析器...');
      const userData = {
        name: '测试',
        gender: '女',
        province: '广东',
        subject: '物理类（物化生）',
        score: score,
        userRank: null,
        interests: [],
        targetMajor: '',
        cityPreference: [],
        familyResources: [],
        awayPreference: '支持',
        extra: ''
      };

      const analyzer = new GaoKaoAnalyzer(userData);
      log('✅ 分析器已创建');
      
      log('🟡 执行分析...');
      const result = analyzer.analyze();
      log('✅ 分析完成', 'success');
      log(`分数层级: ${result.scoreLevel.label}`);
      log(`推荐院校数: ${result.recommendations.length}`);
      log('✨ 测试成功！', 'success');
      
    } catch (error) {
      log(`❌ 错误: ${error.message}`, 'error');
    }
  }

  window.addEventListener('load', () => {
    log('✅ 页面加载完成');
    if (typeof COLLEGES === 'undefined') {
      log('❌ COLLEGES 未定义', 'error');
    }
    if (typeof GaoKaoAnalyzer === 'undefined') {
      log('❌ GaoKaoAnalyzer 未定义', 'error');
    }
  });
</script>

</body>
</html>
